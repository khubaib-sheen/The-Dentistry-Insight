<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — The Dentistry Insight</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- Supabase (Auth + Database) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  body{font-family:'Inter',sans-serif;background:#f1f5f9;}
  .spinner{border:3px solid #e2e8f0;border-top:3px solid #0056b3;border-radius:50%;width:18px;height:18px;animation:spin 0.7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .tab-btn.active{background:#0056b3;color:#fff;}
  .custom-scroll::-webkit-scrollbar{width:6px;height:6px;}
  .custom-scroll::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px;}
  table.data-table th, table.data-table td{padding:.6rem .75rem;font-size:.72rem;}
  table.data-table tbody tr:hover{background:#f8fafc;}
</style>
</head>
<body class="min-h-screen">

  <!-- Toast -->
  <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 hidden z-[100] px-6 py-3 rounded-xl shadow-2xl text-sm font-bold text-white"></div>

  <!-- Confirm Modal -->
  <div id="confirmModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[110] hidden items-center justify-center p-4">
    <div class="bg-white rounded-2xl max-w-sm w-full p-6 shadow-2xl border border-slate-100">
      <div class="flex items-center gap-3 mb-4">
        <div class="w-10 h-10 rounded-full bg-rose-50 text-rose-600 flex items-center justify-center"><i class="fa-solid fa-triangle-exclamation"></i></div>
        <h3 class="text-base font-bold text-slate-800">Confirm Delete</h3>
      </div>
      <p class="text-sm text-slate-600 mb-6">This entry will be permanently removed. Are you sure?</p>
      <div class="flex justify-end gap-3">
        <button id="confirmCancelBtn" class="px-4 py-2.5 bg-slate-100 text-slate-700 text-xs font-bold rounded-lg hover:bg-slate-200 transition">Cancel</button>
        <button id="confirmProceedBtn" class="px-4 py-2.5 bg-rose-600 text-white text-xs font-bold rounded-lg hover:bg-rose-700 transition">Delete</button>
      </div>
    </div>
  </div>

  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-sm bg-white rounded-2xl shadow-xl border border-slate-200 p-8">
      <div class="flex flex-col items-center mb-6">
        <img src="logo.png" alt="The Dentistry Insight" class="h-16 sm:h-20 w-auto object-contain mb-3" onerror="this.style.display='none'">
        <h1 class="text-lg font-black text-slate-900">Admin Panel</h1>
        <p class="text-xs text-slate-400 mt-1">The Dentistry Insight</p>
      </div>
      <form id="loginForm" class="space-y-4">
        <div>
          <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1">Email</label>
          <input type="email" id="loginEmail" required class="w-full px-4 py-2.5 border border-slate-200 rounded-lg text-sm outline-none focus:border-[#0056b3]">
        </div>
        <div>
          <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1">Password</label>
          <input type="password" id="loginPassword" required class="w-full px-4 py-2.5 border border-slate-200 rounded-lg text-sm outline-none focus:border-[#0056b3]">
        </div>
        <button type="submit" id="loginBtn" class="w-full py-3 bg-[#0c2340] hover:bg-slate-800 text-white font-bold text-sm rounded-lg transition flex items-center justify-center gap-2">
          <span id="loginBtnText">Login</span>
        </button>
        <p id="loginError" class="hidden text-xs font-semibold text-rose-600 text-center"></p>
      </form>
    </div>
  </div>

  <!-- ADMIN DASHBOARD -->
  <div id="dashboardScreen" class="hidden min-h-screen">
    <div class="flex items-center justify-between px-4 sm:px-6 py-4 bg-[#0c2340] sticky top-0 z-40 shadow-md">
      <div class="flex items-center gap-3">
        <img src="logo.png" alt="Profile" class="h-9 w-9 sm:h-11 sm:w-11 rounded-full object-cover bg-white p-0.5" onerror="this.style.display='none'">
        <div>
          <h2 class="text-white font-black text-sm sm:text-base leading-tight">Admin Panel</h2>
          <p class="text-[10px] text-slate-300">The Dentistry Insight</p>
        </div>
      </div>
      <button onclick="handleLogout()" class="px-3 py-2 bg-rose-600 hover:bg-rose-700 text-white text-xs font-bold rounded-lg transition flex items-center gap-1.5">
        <i class="fa-solid fa-right-from-bracket"></i> <span class="hidden sm:inline">Logout</span>
      </button>
    </div>

    <div class="max-w-6xl mx-auto p-4 sm:p-6">
      <!-- Tabs -->
      <div id="tabBar" class="flex flex-wrap gap-2 mb-6"></div>

      <!-- Add / Edit form -->
      <div class="bg-white rounded-2xl shadow-xl border border-slate-200 p-6 mb-8">
        <div class="flex items-center justify-between mb-4">
          <h3 id="formTitle" class="text-sm font-black text-slate-900 uppercase tracking-wide"></h3>
          <button id="cancelEditBtn" onclick="cancelEdit()" class="hidden text-xs font-bold text-slate-400 hover:text-slate-600">
            <i class="fa-solid fa-xmark mr-1"></i>Cancel Edit
          </button>
        </div>
        <form id="itemForm" class="space-y-4">
          <div id="formFields" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
          <button type="submit" id="submitBtn" class="w-full sm:w-auto px-6 py-3 bg-[#0056b3] hover:bg-blue-700 text-white font-bold text-sm rounded-lg transition flex items-center justify-center gap-2">
            <span id="submitBtnText">Publish</span>
          </button>
        </form>
      </div>

      <!-- List table -->
      <div class="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
        <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
          <h3 id="listTitle" class="text-sm font-black text-slate-900 uppercase tracking-wide"></h3>
          <span id="listCount" class="text-xs font-semibold text-slate-400"></span>
        </div>
        <div class="overflow-x-auto custom-scroll">
          <table class="data-table w-full text-left">
            <thead class="bg-slate-50 border-b border-slate-100">
              <tr id="listHeadRow"></tr>
            </thead>
            <tbody id="listBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

<script>
  // ============================================================
  // SUPABASE CONFIG
  // ------------------------------------------------------------
  // Project URL + the publishable ("anon") key. This same key is used on
  // both index.html and admin.html — that is how Supabase is designed to
  // work. It is safe to expose in client-side code because access is
  // governed entirely by your Row Level Security (RLS) policies, not by
  // keeping this key secret:
  //   - public SELECT policy on all 5 tables -> anyone can read (index.html)
  //   - INSERT/UPDATE/DELETE restricted to "authenticated" -> only a user
  //     who has logged in here via Supabase Auth (see login form) can write
  // Never put your service_role / secret key in any HTML/JS file — that key
  // bypasses RLS entirely and must only ever live on a private server.
  // ============================================================
  const SUPABASE_URL = "https://rtzxxeeqfhmmnoubwzvq.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_v8RouLqDckbyAXURXFo18w_Q0M3Qx5-";
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const auth = supabaseClient.auth;
  let currentUser = null;

  // ============================================================
  // TABLE / FORM DEFINITIONS — matches your exact schema
  // ============================================================
  const TABS = {
    jobs: {
      table: 'admin_jobs',
      label: 'Jobs',
      icon: 'fa-briefcase',
      fields: [
        { key: 'title',       label: 'Job Title',   type: 'text',     required: false  },
        { key: 'company',     label: 'Company',     type: 'text',     required: false  },
        { key: 'location',    label: 'Location',    type: 'text',     required: false },
        { key: 'salary',      label: 'Salary',      type: 'text',     required: false },
        { key: 'apply_link',  label: 'Apply Link',  type: 'url',      required: false },
        { key: 'image',       label: 'Cover Image',    type: 'file', accept: 'image/*',        bucket: 'images', column: 'image_url', required: false },
        { key: 'pdf',         label: 'PDF Attachment', type: 'file', accept: 'application/pdf', bucket: 'pdfs',   column: 'pdf_url',   required: false },
        { key: 'description', label: 'Description', type: 'textarea', required: true  }
      ],
      listColumns: ['title', 'company', 'location', 'created_at']
    },
    blogs: {
      table: 'admin_blogs',
      label: 'Blogs',
      icon: 'fa-blog',
      fields: [
        { key: 'title',       label: 'Title',             type: 'text',     required: false  },
        { key: 'category',    label: 'Category',          type: 'text',     required: false },
        { key: 'image',       label: 'Cover Image',       type: 'file', accept: 'image/*',        bucket: 'images', column: 'image_url', required: false },
        { key: 'pdf',         label: 'PDF Attachment',    type: 'file', accept: 'application/pdf', bucket: 'pdfs',   column: 'pdf_url',   required: false },
        { key: 'description', label: 'Short Description', type: 'textarea', required: true  },
        { key: 'content',     label: 'Full Content',      type: 'textarea', required: false }
      ],
      listColumns: ['title', 'category', 'created_at']
    },
    posts: {
      table: 'admin_posts',
      label: 'Posts',
      icon: 'fa-note-sticky',
      fields: [
        { key: 'title',       label: 'Title',       type: 'text',     required: false  },
        { key: 'image',       label: 'Cover Image',    type: 'file', accept: 'image/*',        bucket: 'images', column: 'image_url', required: false },
        { key: 'pdf',         label: 'PDF Attachment', type: 'file', accept: 'application/pdf', bucket: 'pdfs',   column: 'pdf_url',   required: false },
        { key: 'description', label: 'Description', type: 'textarea', required: true  }
      ],
      listColumns: ['title', 'created_at']
    },
    market: {
      table: 'admin_market',
      label: 'Market',
      icon: 'fa-tags',
      fields: [
        { key: 'title',       label: 'Item Title',  type: 'text',     required: false  },
        { key: 'price',       label: 'Price',       type: 'text',     required: false },
        { key: 'contact',     label: 'Contact',     type: 'text',     required: false },
        { key: 'image',       label: 'Cover Image',    type: 'file', accept: 'image/*',        bucket: 'images', column: 'image_url', required: false },
        { key: 'pdf',         label: 'PDF Attachment', type: 'file', accept: 'application/pdf', bucket: 'pdfs',   column: 'pdf_url',   required: false },
        { key: 'description', label: 'Description', type: 'textarea', required: true  }
      ],
      listColumns: ['title', 'price', 'contact', 'created_at']
    },
    exams: {
      table: 'admin_exams',
      label: 'Exams',
      icon: 'fa-graduation-cap',
      fields: [
        { key: 'title',       label: 'Exam Title',  type: 'text',     required: false  },
        { key: 'exam_date',   label: 'Exam Date',   type: 'date',     required: false },
        { key: 'link',        label: 'Link',        type: 'url',      required: false },
        { key: 'image',       label: 'Cover Image',    type: 'file', accept: 'image/*',        bucket: 'images', column: 'image_url', required: false },
        { key: 'pdf',         label: 'PDF Attachment', type: 'file', accept: 'application/pdf', bucket: 'pdfs',   column: 'pdf_url',   required: false },
        { key: 'description', label: 'Description', type: 'textarea', required: true  }
      ],
      listColumns: ['title', 'exam_date', 'created_at']
    }
  };

  let activeTab = 'jobs';
  let editingId = null;
  let editingRow = null;
  let confirmCallback = null;

  // ---------------- Utilities ----------------
  function escapeHtml(str) {
    if (str === null || str === undefined) return '';
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function showToast(message, type) {
    const el = document.getElementById('toast');
    el.textContent = message;
    el.className = "fixed top-6 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-xl shadow-2xl text-sm font-bold text-white " +
      (type === 'error' ? 'bg-rose-600' : type === 'success' ? 'bg-emerald-600' : 'bg-slate-900');
    el.classList.remove('hidden');
    setTimeout(() => el.classList.add('hidden'), 3500);
  }

  function showConfirm(onYes) {
    confirmCallback = onYes;
    const m = document.getElementById('confirmModal');
    m.classList.remove('hidden');
    m.classList.add('flex');
  }
  document.getElementById('confirmCancelBtn').addEventListener('click', () => {
    document.getElementById('confirmModal').classList.add('hidden');
    confirmCallback = null;
  });
  document.getElementById('confirmProceedBtn').addEventListener('click', () => {
    document.getElementById('confirmModal').classList.add('hidden');
    if (confirmCallback) confirmCallback();
    confirmCallback = null;
  });

  // ---------------- Auth ----------------
  function showLogin() {
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('dashboardScreen').classList.add('hidden');
  }
  function showDashboard() {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('dashboardScreen').classList.remove('hidden');
    renderTabs();
    setActiveTab(activeTab);
  }

  auth.onAuthStateChange((event, session) => {
    currentUser = session ? session.user : null;
    if (currentUser) showDashboard(); else showLogin();
  });

  document.getElementById('loginForm').addEventListener('submit', function (e) {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const btn = document.getElementById('loginBtn');
    const errorEl = document.getElementById('loginError');
    errorEl.classList.add('hidden');
    btn.disabled = true;
    document.getElementById('loginBtnText').innerHTML = '<span class="spinner inline-block align-middle"></span>';

    auth.signInWithPassword({ email, password })
      .then(({ error }) => { if (error) throw error; })
      .catch(err => {
        errorEl.textContent = err.message;
        errorEl.classList.remove('hidden');
      })
      .finally(() => {
        btn.disabled = false;
        document.getElementById('loginBtnText').textContent = 'Login';
      });
  });

  function handleLogout() {
    auth.signOut().then(() => showToast('Logged out.', 'info'));
  }

  // ---------------- Tabs ----------------
  function renderTabs() {
    const bar = document.getElementById('tabBar');
    bar.innerHTML = Object.keys(TABS).map(key => `
      <button onclick="setActiveTab('${key}')" id="tabbtn-${key}"
        class="tab-btn px-4 py-2.5 rounded-lg text-xs font-bold bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 transition flex items-center gap-2">
        <i class="fa-solid ${TABS[key].icon}"></i> ${TABS[key].label}
      </button>
    `).join('');
  }

  function setActiveTab(key) {
    activeTab = key;
    editingId = null;
    editingRow = null;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    const btn = document.getElementById(`tabbtn-${key}`);
    if (btn) btn.classList.add('active');
    renderForm();
    loadList();
  }

  // ---------------- Form ----------------
  function renderForm() {
    const cfg = TABS[activeTab];
    document.getElementById('formTitle').textContent = (editingId ? 'Edit ' : 'Add New ') + cfg.label;
    document.getElementById('submitBtnText').textContent = editingId ? 'Update' : 'Publish';
    document.getElementById('cancelEditBtn').classList.toggle('hidden', !editingId);

    const wrap = document.getElementById('formFields');
    wrap.innerHTML = cfg.fields.map(f => {
      const full = (f.type === 'textarea') ? 'sm:col-span-2' : '';
      const req = f.required ? 'required' : '';
      let control;
      if (f.type === 'textarea') {
        control = `<textarea id="field-${f.key}" rows="${f.key === 'content' ? 6 : 3}" ${req} class="w-full px-4 py-2.5 border border-slate-200 rounded-lg text-sm outline-none focus:border-[#0056b3] resize-none"></textarea>`;
      } else if (f.type === 'file') {
        control = `
          <input type="file" id="field-${f.key}" accept="${f.accept || ''}" class="w-full text-xs px-3 py-2.5 border border-slate-200 rounded-lg outline-none focus:border-[#0056b3] bg-white">
          <p id="field-${f.key}-current" class="text-[10px] text-slate-400 mt-1"></p>
        `;
      } else {
        control = `<input type="${f.type}" id="field-${f.key}" ${req} class="w-full px-4 py-2.5 border border-slate-200 rounded-lg text-sm outline-none focus:border-[#0056b3]">`;
      }
      return `
        <div class="${full}">
          <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1">${f.label}${f.required ? ' *' : ''}</label>
          ${control}
        </div>
      `;
    }).join('');

    // Show existing file links when editing
    if (editingId && editingRow) {
      cfg.fields.filter(f => f.type === 'file').forEach(f => {
        const url = editingRow[f.column];
        const currentEl = document.getElementById(`field-${f.key}-current`);
        if (currentEl) {
          currentEl.innerHTML = url
            ? `Current: <a href="${url}" target="_blank" rel="noopener" class="text-[#0056b3] font-semibold underline">view file</a> — choose a new file to replace it`
            : 'No file uploaded yet';
        }
      });
    }
  }

  function cancelEdit() {
    editingId = null;
    editingRow = null;
    renderForm();
    document.getElementById('itemForm').reset();
  }

  document.getElementById('itemForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    if (!currentUser) { showToast('You must be logged in.', 'error'); return; }

    const cfg = TABS[activeTab];
    const payload = {};

    // Text / textarea / url / date fields
    for (const f of cfg.fields) {
      if (f.type === 'file') continue;
      const val = document.getElementById(`field-${f.key}`).value.trim();
      payload[f.key] = val === '' ? null : val;
    }

    const submitBtn = document.getElementById('submitBtn');
    submitBtn.disabled = true;
    document.getElementById('submitBtnText').innerHTML = '<span class="spinner inline-block align-middle"></span>';

    try {
      // File fields — upload to Storage if a new file was chosen, otherwise
      // keep whatever was already saved (when editing) or leave empty.
      for (const f of cfg.fields.filter(x => x.type === 'file')) {
        const fileInput = document.getElementById(`field-${f.key}`);
        const file = fileInput.files[0];
        if (file) {
          const path = `${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g, '_')}`;
          const { error: upErr } = await supabaseClient.storage.from(f.bucket).upload(path, file, { upsert: true });
          if (upErr) throw upErr;
          const { data: urlData } = supabaseClient.storage.from(f.bucket).getPublicUrl(path);
          payload[f.column] = urlData.publicUrl;
        } else if (editingId && editingRow) {
          payload[f.column] = editingRow[f.column] || null;
        } else {
          payload[f.column] = null;
        }
      }

      if (editingId) {
        const { error } = await supabaseClient.from(cfg.table).update(payload).eq('id', editingId);
        if (error) throw error;
        showToast(cfg.label.slice(0, -1) + ' updated successfully!', 'success');
      } else {
        const { error } = await supabaseClient.from(cfg.table).insert([payload]);
        if (error) throw error;
        showToast('Post Published Successfully!', 'success');
      }
      editingId = null;
      editingRow = null;
      document.getElementById('itemForm').reset();
      renderForm();
      loadList();
    } catch (err) {
      showToast(err.message, 'error');
    } finally {
      submitBtn.disabled = false;
      document.getElementById('submitBtnText').textContent = editingId ? 'Update' : 'Publish';
    }
  });

  // ---------------- List / Edit / Delete ----------------
  async function loadList() {
    const cfg = TABS[activeTab];
    document.getElementById('listTitle').textContent = 'Existing ' + cfg.label;

    const headRow = document.getElementById('listHeadRow');
    headRow.innerHTML = cfg.listColumns.map(c =>
      `<th class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">${c.replace('_', ' ')}</th>`
    ).join('') + `<th class="text-[10px] font-bold text-slate-500 uppercase tracking-wider text-right">Actions</th>`;

    const body = document.getElementById('listBody');
    body.innerHTML = `<tr><td colspan="${cfg.listColumns.length + 1}" class="py-6 text-center text-xs text-slate-400"><span class="spinner inline-block align-middle mr-2"></span>Loading...</td></tr>`;

    const { data, error } = await supabaseClient
      .from(cfg.table)
      .select('*')
      .order('created_at', { ascending: false });

    if (error) {
      body.innerHTML = `<tr><td colspan="${cfg.listColumns.length + 1}" class="py-6 text-center text-xs text-rose-500">${escapeHtml(error.message)}</td></tr>`;
      document.getElementById('listCount').textContent = '';
      return;
    }

    document.getElementById('listCount').textContent = `${data.length} item${data.length === 1 ? '' : 's'}`;

    if (data.length === 0) {
      body.innerHTML = `<tr><td colspan="${cfg.listColumns.length + 1}" class="py-8 text-center text-xs text-slate-400">No entries yet. Add one above.</td></tr>`;
      return;
    }

    body.innerHTML = data.map(row => {
      const cells = cfg.listColumns.map(c => {
        let v = row[c];
        if (c === 'created_at' && v) v = new Date(v).toLocaleDateString();
        if (c === 'exam_date' && v) v = new Date(v).toLocaleDateString();
        return `<td class="text-slate-700 max-w-[220px] truncate">${escapeHtml(v || '—')}</td>`;
      }).join('');
      return `
        <tr class="border-b border-slate-50">
          ${cells}
          <td class="text-right whitespace-nowrap">
            <button onclick='startEdit(${JSON.stringify(row).replace(/'/g, "&#39;")})' class="px-3 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg text-[10px] font-bold transition mr-2">
              <i class="fa-solid fa-pen"></i> Edit
            </button>
            <button onclick="confirmDelete('${row.id}')" class="px-3 py-1.5 bg-rose-50 hover:bg-rose-100 text-rose-600 rounded-lg text-[10px] font-bold transition">
              <i class="fa-solid fa-trash-can"></i> Delete
            </button>
          </td>
        </tr>
      `;
    }).join('');
  }

  function startEdit(row) {
    editingId = row.id;
    editingRow = row;
    renderForm();
    const cfg = TABS[activeTab];
    cfg.fields.forEach(f => {
      if (f.type === 'file') return; // can't prefill file inputs; preview handled in renderForm
      const el = document.getElementById(`field-${f.key}`);
      if (el) el.value = row[f.key] || '';
    });
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function confirmDelete(id) {
    showConfirm(async () => {
      const cfg = TABS[activeTab];
      try {
        const { error } = await supabaseClient.from(cfg.table).delete().eq('id', id);
        if (error) throw error;
        showToast(cfg.label.slice(0, -1) + ' deleted.', 'success');
        if (editingId === id) cancelEdit();
        loadList();
      } catch (err) {
        showToast(err.message, 'error');
      }
    });
  }
</script>

</body>
</html>

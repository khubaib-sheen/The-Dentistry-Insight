<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — The Dentistry Insight</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-analytics-compat.js"></script>

<style>
  body{font-family:'Inter',sans-serif;background:#f1f5f9;}
  .spinner{border:3px solid #e2e8f0;border-top:3px solid #0056b3;border-radius:50%;width:18px;height:18px;animation:spin 0.7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

  <!-- Toast -->
  <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 hidden z-50 px-6 py-3 rounded-xl shadow-2xl text-sm font-bold text-white"></div>

  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="w-full max-w-sm bg-white rounded-2xl shadow-xl border border-slate-200 p-8">
    <div class="flex flex-col items-center mb-6">
      <img src="logo.png" alt="The Dentistry Insight" class="h-16 sm:h-20 w-auto object-contain mb-3">
      <h1 class="text-lg font-black text-slate-900">Admin Panel</h1>
      <p class="text-xs text-slate-400 mt-1">The Dentistry Insight</p>
    </div>
    <form id="loginForm" class="space-y-4">
      <div>
        <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1">Email</label>
        <input type="email" id="loginEmail" required class="w-full px-4 py-2.5 border border-slate-200 rounded-lg text-sm outline-none focus:border-[#0056b3]">
      </div>
      <div>
        <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1">Password</label>
        <input type="password" id="loginPassword" required class="w-full px-4 py-2.5 border border-slate-200 rounded-lg text-sm outline-none focus:border-[#0056b3]">
      </div>
      <button type="submit" id="loginBtn" class="w-full py-3 bg-[#0c2340] hover:bg-slate-800 text-white font-bold text-sm rounded-lg transition flex items-center justify-center gap-2">
        <span id="loginBtnText">Login</span>
      </button>
      <p id="loginError" class="hidden text-xs font-semibold text-rose-600 text-center"></p>
    </form>
  </div>

  <!-- ADMIN DASHBOARD -->
  <div id="dashboardScreen" class="hidden w-full max-w-2xl bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
    <div class="flex items-center justify-between px-6 py-5 border-b border-slate-100 bg-[#0c2340]">
      <div class="flex items-center gap-3">
        <img src="logo.png" alt="Profile" class="h-9 w-9 sm:h-11 sm:w-11 rounded-full object-cover bg-white p-0.5">
        <div>
          <h2 class="text-white font-black text-sm sm:text-base leading-tight">Admin Panel</h2>
          <p class="text-[10px] text-slate-300">The Dentistry Insight</p>
        </div>
      </div>
      <button onclick="handleLogout()" class="px-3 py-2 bg-rose-600 hover:bg-rose-700 text-white text-xs font-bold rounded-lg transition flex items-center gap-1.5">
        <i class="fa-solid fa-right-from-bracket"></i> <span class="hidden sm:inline">Logout</span>
      </button>
    </div>

    <form id="postForm" class="p-6 space-y-4">
      <div>
        <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1">Post Section</label>
        <select id="section" class="w-full px-4 py-2.5 border border-slate-200 rounded-lg text-sm outline-none focus:border-[#0056b3] bg-white">
          <option value="blogs">Blogs</option>
          <option value="jobs">Jobs</option>
          <option value="posts">Posts</option>
          <option value="market">Market</option>
          <option value="exams">Exams</option>
        </select>
      </div>

      <div>
        <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1">Title</label>
        <input type="text" id="title" required class="w-full px-4 py-2.5 border border-slate-200 rounded-lg text-sm outline-none focus:border-[#0056b3]">
      </div>

      <div>
        <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1">Description</label>
        <textarea id="description" rows="5" required class="w-full px-4 py-2.5 border border-slate-200 rounded-lg text-sm outline-none focus:border-[#0056b3] resize-none"></textarea>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1">Image Upload</label>
          <input type="file" id="imageFile" accept="image/*" class="w-full text-xs px-3 py-2.5 border border-slate-200 rounded-lg outline-none focus:border-[#0056b3] bg-white">
        </div>
        <div>
          <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1">PDF Upload</label>
          <input type="file" id="pdfFile" accept="application/pdf" class="w-full text-xs px-3 py-2.5 border border-slate-200 rounded-lg outline-none focus:border-[#0056b3] bg-white">
        </div>
      </div>

      <div id="progressWrap" class="hidden">
        <div class="w-full bg-slate-100 rounded-full h-2 overflow-hidden">
          <div id="progressBar" class="bg-[#0056b3] h-2 rounded-full transition-all" style="width:0%"></div>
        </div>
        <p id="progressText" class="text-[10px] text-slate-400 mt-1"></p>
      </div>

      <button type="submit" id="publishBtn" class="w-full py-3 bg-[#0056b3] hover:bg-blue-700 text-white font-bold text-sm rounded-lg transition flex items-center justify-center gap-2">
        <span id="publishBtnText">Publish</span>
      </button>
    </form>
  </div>

<script>
  const ADMIN_UID = "BZBp8oisD8YeonTzngtLfbXrHcK2";

  const firebaseConfig = {
    apiKey: "AIzaSyDNDU4GCtvEfg48wbAfwh8EZ3EseRktEmk",
    authDomain: "the-dentistry-insight.firebaseapp.com",
    projectId: "the-dentistry-insight",
    storageBucket: "the-dentistry-insight.firebasestorage.app",
    messagingSenderId: "219121521754",
    appId: "1:219121521754:web:920c10f2bcfaa141973463",
    measurementId: "G-J1WXP5FJCC"
  };

  firebase.initializeApp(firebaseConfig);
  if (firebase.analytics) { firebase.analytics(); }
  const auth = firebase.auth();
  const db = firebase.firestore();
  const storage = firebase.storage();

  const COLLECTION_MAP = {
    blogs: "admin_blogs",
    jobs: "admin_jobs",
    posts: "admin_posts",
    market: "admin_market",
    exams: "admin_exams"
  };

  function showToast(message, type) {
    const el = document.getElementById('toast');
    el.textContent = message;
    el.className = "fixed top-6 left-1/2 -translate-x-1/2 z-50 px-6 py-3 rounded-xl shadow-2xl text-sm font-bold text-white " +
      (type === 'error' ? 'bg-rose-600' : type === 'success' ? 'bg-emerald-600' : 'bg-slate-900');
    el.classList.remove('hidden');
    setTimeout(() => el.classList.add('hidden'), 3500);
  }

  function showLogin() {
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('dashboardScreen').classList.add('hidden');
  }

  function showDashboard() {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('dashboardScreen').classList.remove('hidden');
  }

  auth.onAuthStateChanged(user => {
    if (user) {
      if (user.uid === ADMIN_UID) {
        showDashboard();
      } else {
        document.getElementById('loginError').textContent = "Sirf Admin ko ijazat hai";
        document.getElementById('loginError').classList.remove('hidden');
        auth.signOut();
        showLogin();
      }
    } else {
      showLogin();
    }
  });

  document.getElementById('loginForm').addEventListener('submit', function (e) {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const btn = document.getElementById('loginBtn');
    const errorEl = document.getElementById('loginError');
    errorEl.classList.add('hidden');
    btn.disabled = true;
    document.getElementById('loginBtnText').innerHTML = '<span class="spinner inline-block align-middle"></span>';

    auth.signInWithEmailAndPassword(email, password)
      .then(cred => {
        if (cred.user.uid !== ADMIN_UID) {
          errorEl.textContent = "Sirf Admin ko ijazat hai";
          errorEl.classList.remove('hidden');
          auth.signOut();
        }
      })
      .catch(err => {
        errorEl.textContent = err.message;
        errorEl.classList.remove('hidden');
      })
      .finally(() => {
        btn.disabled = false;
        document.getElementById('loginBtnText').textContent = 'Login';
      });
  });

  function handleLogout() {
    auth.signOut().then(() => showToast('Logged out.', 'info'));
  }

  function uploadFile(file, folder) {
    return new Promise((resolve, reject) => {
      if (!file) { resolve(""); return; }
      const ref = storage.ref().child(folder + Date.now() + "_" + file.name);
      const task = ref.put(file);
      task.on('state_changed',
        snap => {
          const pct = Math.round((snap.bytesTransferred / snap.totalBytes) * 100);
          document.getElementById('progressWrap').classList.remove('hidden');
          document.getElementById('progressBar').style.width = pct + "%";
          document.getElementById('progressText').textContent = "Uploading " + file.name + "... " + pct + "%";
        },
        err => reject(err),
        () => task.snapshot.ref.getDownloadURL().then(resolve).catch(reject)
      );
    });
  }

  document.getElementById('postForm').addEventListener('submit', async function (e) {
    e.preventDefault();

    if (!auth.currentUser || auth.currentUser.uid !== ADMIN_UID) {
      showToast('Sirf Admin ko ijazat hai', 'error');
      return;
    }

    const section = document.getElementById('section').value;
    const title = document.getElementById('title').value.trim();
    const description = document.getElementById('description').value.trim();
    const imageFile = document.getElementById('imageFile').files[0];
    const pdfFile = document.getElementById('pdfFile').files[0];

    const publishBtn = document.getElementById('publishBtn');
    publishBtn.disabled = true;
    document.getElementById('publishBtnText').innerHTML = '<span class="spinner inline-block align-middle"></span>';

    try {
      const [imageUrl, pdfUrl] = await Promise.all([
        uploadFile(imageFile, "images/"),
        uploadFile(pdfFile, "pdfs/")
      ]);

      await db.collection(COLLECTION_MAP[section]).add({
        title,
        description,
        imageUrl: imageUrl || "",
        pdfUrl: pdfUrl || "",
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });

      showToast('Post Published Successfully!', 'success');
      document.getElementById('postForm').reset();
      document.getElementById('progressWrap').classList.add('hidden');
      document.getElementById('progressBar').style.width = '0%';
    } catch (err) {
      showToast(err.message, 'error');
    } finally {
      publishBtn.disabled = false;
      document.getElementById('publishBtnText').textContent = 'Publish';
    }
  });
</script>

</body>
</html>
